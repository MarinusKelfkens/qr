<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>QR Code</title>
    <style>
      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: system-ui, -apple-system, sans-serif;
        background: #f4f4f5;
        color: #18181b;
      }

      main {
        text-align: center;
        padding: 2rem;
        background: white;
        border-radius: 1rem;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
      }

      h1 {
        margin: 0 0 0.5rem;
        font-size: 1.5rem;
      }

      p {
        margin: 0 0 1.5rem;
        color: #52525b;
      }

      img {
        display: block;
        width: min(280px, 80vw);
        height: auto;
        margin: 0 auto;
        border: 1px solid #e4e4e7;
        border-radius: 0.5rem;
      }

      code {
        display: inline-block;
        margin-top: 1rem;
        padding: 0.35rem 0.6rem;
        background: #f4f4f5;
        border-radius: 0.35rem;
        font-size: 0.85rem;
        word-break: break-all;
      }

      .stats-link {
        display: inline-block;
        margin-top: 1.25rem;
        color: #52525b;
        font-size: 0.9rem;
      }

      .stats-link:hover {
        color: #18181b;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Scan the QR code</h1>
      <p>It takes you to a secret page.</p>
      <img src="{{ url_for('qr_png') }}" alt="QR code" width="280" height="280" />
      <code>{{ target }}</code>
      <a class="stats-link" href="{{ url_for('stats') }}">View visit stats</a>
    </main>
  </body>
</html>
